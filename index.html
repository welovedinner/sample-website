<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>聚餐小助手</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            min-height: 100vh;
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .split-layout { display: flex; gap: 20px; }
        .left-panel { flex: 0 0 400px; min-width: 0; transition: all 0.3s ease; }
        .right-panel { flex: 1; min-width: 0; display: none; }
        .right-panel.active { display: block; }
        .right-panel-content { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.04); position: sticky; top: 20px; max-height: calc(100vh - 40px); overflow-y: auto; }
        @media (max-width: 900px) {
            .split-layout { flex-direction: column; }
            .left-panel { flex: none; width: 100%; }
            .left-panel.collapsed { display: none; }
            .right-panel { width: 100%; }
            .close-detail-btn { display: none; }
        }
        .mobile-back-btn { display: none; margin-bottom: 16px; color: #667eea; cursor: pointer; font-size: 0.95rem; padding: 8px 0; }
        .mobile-back-btn:hover { text-decoration: underline; }
        @media (max-width: 900px) {
            .mobile-back-btn { display: flex; align-items: center; gap: 4px; }
        }
        header { text-align: center; padding: 20px 0; }
        header h1 { font-size: 1.6rem; color: #333; }
        header p { color: #888; font-size: 0.9rem; margin-top: 4px; }
        .tabs { display: flex; margin-bottom: 20px; background: white; border-radius: 12px; padding: 4px; }
        .tab { flex: 1; padding: 12px; text-align: center; border-radius: 10px; cursor: pointer; font-size: 0.95rem; transition: all 0.2s; }
        .tab.active { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
        .tab:not(.active) { color: #666; }
        .tab:not(.active):hover { background: #f0f0f0; }
        .btn { display: inline-block; padding: 12px 24px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 8px; font-size: 1rem; cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4); }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        .btn-outline { background: white; color: #667eea; border: 1px solid #667eea; }
        .btn-outline:hover { background: #f8f9ff; box-shadow: none; transform: none; }
        .btn-small { padding: 8px 16px; font-size: 0.85rem; }
        .btn-block { width: 100%; }
        .card { background: white; border-radius: 12px; padding: 16px; margin-bottom: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.04); cursor: pointer; transition: box-shadow 0.2s; }
        .card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.08); }
        .card.active { box-shadow: 0 0 0 2px #667eea, 0 4px 16px rgba(0,0,0,0.08); }
        /* 有图片的卡片样式 */
        .card-has-images { background: linear-gradient(135deg, #f0f8ff 0%, #f5f0ff 100%); border-left: 3px solid #667eea; }
        /* 近期有人想去的卡片样式 */
        .card-has-recent-wish { background: linear-gradient(135deg, #fff8f0 0%, #fff0f5 100%); border-left: 3px solid #ff6b6b; }
        .card h3 { font-size: 1.1rem; color: #333; margin-bottom: 8px; }
        .card-meta { font-size: 0.85rem; color: #888; display: flex; gap: 12px; flex-wrap: wrap; }
        .card-meta span { display: flex; align-items: center; gap: 4px; }
        .card-meta .wish-badge { color: #ff6b6b; font-weight: 500; }
        .card-desc { font-size: 0.9rem; color: #666; margin: 8px 0; }
        .empty { text-align: center; padding: 60px 20px; color: #999; }
        .empty p { margin-bottom: 20px; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 1000; }
        .modal.active { display: flex; }
        .modal-content { background: white; border-radius: 16px; padding: 24px; width: 90%; max-width: 400px; max-height: 85vh; overflow-y: auto; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .modal-header h2 { font-size: 1.2rem; }
        .close-btn { background: none; border: none; font-size: 1.5rem; cursor: pointer; color: #999; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; margin-bottom: 6px; font-size: 0.9rem; color: #555; font-weight: 500; }
        .form-group input, .form-group textarea { width: 100%; padding: 12px; border: 1px solid #e0e0e0; border-radius: 8px; font-size: 1rem; transition: border-color 0.2s; }
        .form-group input:focus, .form-group textarea:focus { outline: none; border-color: #667eea; }
        .detail-header { margin-bottom: 20px; display: flex; justify-content: space-between; align-items: flex-start; }
        .detail-header-content { flex: 1; }
        .detail-header h2 { font-size: 1.4rem; color: #333; margin-bottom: 8px; }
        .detail-meta { font-size: 0.85rem; color: #888; }
        .close-detail-btn { background: none; border: none; font-size: 1.5rem; cursor: pointer; color: #999; padding: 0; line-height: 1; }
        .close-detail-btn:hover { color: #667eea; }
        .detail-desc { font-size: 1rem; color: #555; margin: 16px 0; padding: 12px; background: #f9f9f9; border-radius: 8px; }
        .back-btn { margin-bottom: 16px; color: #667eea; cursor: pointer; font-size: 0.9rem; }
        .back-btn:hover { text-decoration: underline; }
        .comments-section { margin-top: 24px; }
        .comments-section h3 { font-size: 1rem; color: #666; margin-bottom: 12px; }
        .comment { padding: 12px; background: #fafafa; border-radius: 8px; margin-bottom: 8px; }
        .comment-with-image { background: #f0f8ff; border-left: 3px solid #667eea; }
        .comment-header { font-size: 0.85rem; color: #888; margin-bottom: 6px; }
        .comment-content { font-size: 0.95rem; color: #333; }
        .comment-images { display: flex; gap: 8px; margin-top: 8px; flex-wrap: wrap; }
        .comment-images img { max-width: 150px; max-height: 150px; border-radius: 8px; cursor: pointer; object-fit: cover; border: 1px solid #eee; }
        .comment-images img:hover { opacity: 0.9; }
        .comment-form-wrapper { margin-top: 16px; background: #f9f9f9; border-radius: 12px; padding: 12px; }
        .comment-input-row { display: flex; gap: 8px; }
        .comment-input-row input { flex: 1; }
        .image-upload-area { margin-top: 10px; }
        .image-upload-btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 12px; background: white; border: 1px dashed #ccc; border-radius: 8px; cursor: pointer; font-size: 0.85rem; color: #666; transition: border-color 0.2s; }
        .image-upload-btn:hover { border-color: #667eea; color: #667eea; }
        .image-upload-btn input { display: none; }
        .image-preview-list { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
        .image-preview-item { position: relative; }
        .image-preview-item img { width: 80px; height: 80px; object-fit: cover; border-radius: 8px; border: 1px solid #ddd; }
        .image-preview-item .remove-btn { position: absolute; top: -6px; right: -6px; width: 20px; height: 20px; background: #ff4d4f; color: white; border: none; border-radius: 50%; cursor: pointer; font-size: 12px; line-height: 1; display: flex; align-items: center; justify-content: center; }
        .upload-hint { font-size: 0.75rem; color: #999; margin-top: 6px; }
        .lightbox { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 3000; justify-content: center; align-items: center; cursor: pointer; }
        .lightbox.active { display: flex; }
        .lightbox img { max-width: 90%; max-height: 90%; object-fit: contain; }
        .nickname-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); display: flex; justify-content: center; align-items: center; z-index: 2000; }
        .nickname-box { background: white; border-radius: 16px; padding: 32px; width: 90%; max-width: 360px; text-align: center; }
        .nickname-box h2 { margin-bottom: 8px; color: #333; }
        .nickname-box p { color: #888; font-size: 0.9rem; margin-bottom: 24px; }
        .loading { text-align: center; padding: 40px; color: #999; }
        .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
        .section-header h2 { font-size: 1.1rem; color: #555; }
        .filter-toggle { display: flex; align-items: center; gap: 6px; font-size: 0.8rem; color: #888; cursor: pointer; user-select: none; }
        .filter-toggle input { cursor: pointer; }
        .placeholder-card { background: #f9f9f9; border: 2px dashed #ddd; text-align: center; padding: 30px; color: #999; }
        footer { text-align: center; padding: 20px; color: #bbb; font-size: 0.75rem; }
        /* 想去按钮样式 */
        .wish-section { margin: 20px 0; padding: 16px; background: linear-gradient(135deg, #fff8f0 0%, #fff0f5 100%); border-radius: 12px; border: 1px solid #ffe4d9; }
        .wish-section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .wish-section h4 { font-size: 0.95rem; color: #666; display: flex; align-items: center; gap: 6px; }
        .wish-count { color: #ff6b6b; font-weight: 600; }
        .wish-list { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; }
        .wish-user { display: inline-flex; align-items: center; gap: 4px; padding: 4px 10px; background: white; border-radius: 20px; font-size: 0.8rem; color: #666; border: 1px solid #ffe4d9; }
        .wish-user-icon { color: #ff6b6b; }
        .toggle-wish-btn { display: inline-flex; align-items: center; gap: 6px; padding: 10px 20px; border-radius: 20px; font-size: 0.9rem; cursor: pointer; transition: all 0.2s; border: none; }
        .toggle-wish-btn.wished { background: linear-gradient(135deg, #ff6b6b 0%, #ff8e8e 100%); color: white; }
        .toggle-wish-btn:not(.wished) { background: white; color: #ff6b6b; border: 1px solid #ff6b6b; }
        .toggle-wish-btn:not(.wished):hover { background: #fff5f5; }
        .toggle-wish-btn:disabled { opacity: 0.6; cursor: not-allowed; }
        /* 列表卡片中的想去徽章 */
        .wish-indicator { display: inline-flex; align-items: center; gap: 3px; padding: 2px 8px; background: linear-gradient(135deg, #ff6b6b 0%, #ff8e8e 100%); color: white; border-radius: 10px; font-size: 0.7rem; margin-left: 8px; }
        .no-wish-hint { color: #999; font-size: 0.85rem; margin-bottom: 12px; }
    </style>
</head>
<body>
    <div class="nickname-overlay" id="nickname-overlay">
        <div class="nickname-box">
            <h2>欢迎使用聚餐小助手</h2>
            <p>请输入你的称呼，方便群友认出你</p>
            <div class="form-group">
                <input type="text" id="nickname-input" placeholder="你的昵称" maxlength="20">
            </div>
            <button class="btn btn-block" onclick="saveNickname()">开始使用</button>
        </div>
    </div>
    <div class="lightbox" id="lightbox" onclick="closeLightbox()">
        <img id="lightbox-img" src="" alt="预览">
    </div>
    <div class="container">
        <header>
            <h1>聚餐小助手</h1>
            <p id="welcome-text"></p>
        </header>
        <div class="split-layout">
            <div class="left-panel" id="left-panel">
                <div class="tabs">
                    <div class="tab active" data-tab="places" onclick="switchTab('places')">想法池</div>
                    <div class="tab" data-tab="events" onclick="switchTab('events')">聚餐事件</div>
                </div>
                <div id="places-section">
                    <div class="section-header">
                        <h2>大家的想法</h2>
                        <div style="display: flex; align-items: center; gap: 12px;">
                            <button class="btn btn-small btn-outline" onclick="randomPickPlace()">🎲 为我选择</button>
                            <button class="btn btn-small" onclick="openCreatePlaceModal()">+ 新建</button>
                        </div>
                    </div>
                    <div id="places-list"><div class="loading">加载中...</div></div>
                </div>
                <div id="events-section" style="display: none;">
                    <div class="section-header">
                        <h2>近期聚餐</h2>
                        <button class="btn btn-small btn-outline" onclick="openCreateEventModal()">+ 发起</button>
                    </div>
                    <div id="events-list">
                        <div class="placeholder-card">
                            <p>聚餐事件功能开发中</p>
                            <p style="font-size: 0.85rem; margin-top: 8px;">敬请期待...</p>
                        </div>
                    </div>
                </div>
            </div>
            <div class="right-panel" id="right-panel">
                <div class="right-panel-content">
                    <div id="detail-content"></div>
                </div>
            </div>
        </div>
        <footer>Created by MiniMax Agent</footer>
    </div>
    <div class="modal" id="create-place-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>新建想法</h2>
                <button class="close-btn" onclick="closeCreatePlaceModal()">&times;</button>
            </div>
            <form id="create-place-form" onsubmit="createPlace(event)">
                <div class="form-group">
                    <label>想法 / 店名 *</label>
                    <input type="text" name="title" required placeholder="如：静安寺附近的寿喜烧">
                </div>
                <div class="form-group">
                    <label>简单描述</label>
                    <textarea name="description" rows="2" placeholder="一句话说明（可选）"></textarea>
                </div>
                <button type="submit" class="btn btn-block">发布想法</button>
            </form>
        </div>
    </div>
    <script>
        const SUPABASE_URL = 'https://xciikonoumkqweemukec.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhjaWlrb25vdW1rcXdlZW11a2VjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzEwNTQ1MjEsImV4cCI6MjA4NjYzMDUyMX0.491qXqrO1H4RNu8LMA_iYtN8DTTKolj3w9VOpV8dIFI';
        const STORAGE_BUCKET = 'images';
        const MAX_IMAGE_SIZE = 2 * 1024 * 1024;
        const MAX_IMAGE_COUNT = 3;
        const ALLOWED_TYPES = ['image/jpeg', 'image/png', 'image/webp'];
        // 近一个月的时间戳（毫秒）
        const ONE_MONTH_MS = 30 * 24 * 60 * 60 * 1000;
        let pendingImages = [];

        async function supabaseFetch(endpoint, options = {}) {
            const url = `${SUPABASE_URL}/rest/v1/${endpoint}`;
            const headers = { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json', 'Prefer': options.prefer || 'return=representation' };
            const response = await fetch(url, { ...options, headers: { ...headers, ...options.headers } });
            if (!response.ok) { const error = await response.text(); throw new Error(error || response.statusText); }
            const text = await response.text();
            return text ? JSON.parse(text) : null;
        }

        // 图片压缩配置
        const MAX_IMAGE_WIDTH = 1200;
        const COMPRESSION_QUALITY = 0.8;

        // 压缩图片函数（使用 Canvas 缩小尺寸 + 降低质量）
        async function compressImage(file) {
            return new Promise((resolve, reject) => {
                const img = new Image();
                img.onload = () => {
                    URL.revokeObjectURL(img.src);

                    let { width, height } = img;

                    // 如果图片尺寸大于最大值，等比例缩小
                    if (width > MAX_IMAGE_WIDTH) {
                        height = Math.round(height * (MAX_IMAGE_WIDTH / width));
                        width = MAX_IMAGE_WIDTH;
                    }

                    const canvas = document.createElement('canvas');
                    canvas.width = width;
                    canvas.height = height;

                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);

                    canvas.toBlob(blob => {
                        if (!blob) {
                            reject(new Error('图片压缩失败'));
                            return;
                        }
                        // 保留原始文件名但改为 jpg
                        const compressedFile = new File([blob], file.name.replace(/\.[^.]+$/, '.jpg'), { type: 'image/jpeg' });
                        console.log(`压缩前: ${(file.size / 1024).toFixed(1)}KB → 压缩后: ${(compressedFile.size / 1024).toFixed(1)}KB`);
                        resolve(compressedFile);
                    }, 'image/jpeg', COMPRESSION_QUALITY);
                };
                img.onerror = () => {
                    URL.revokeObjectURL(img.src);
                    reject(new Error('图片加载失败'));
                };
                img.src = URL.createObjectURL(file);
            });
        }

        async function uploadImage(file) {
            // 先压缩图片
            const compressedFile = await compressImage(file);
            const fileName = `${Date.now()}_${Math.random().toString(36).substr(2, 9)}.jpg`;
            const url = `${SUPABASE_URL}/storage/v1/object/${STORAGE_BUCKET}/${fileName}`;
            const response = await fetch(url, { method: 'POST', headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'image/jpeg', 'x-upsert': 'true' }, body: compressedFile });
            if (!response.ok) { const error = await response.text(); throw new Error(error || '上传失败'); }
            return `${SUPABASE_URL}/storage/v1/object/public/${STORAGE_BUCKET}/${fileName}`;
        }

        function getNickname() { return localStorage.getItem('dinner_nickname'); }
        function saveNickname() {
            const input = document.getElementById('nickname-input');
            const nickname = input.value.trim();
            if (!nickname) { alert('请输入昵称'); return; }
            localStorage.setItem('dinner_nickname', nickname);
            document.getElementById('nickname-overlay').style.display = 'none';
            document.getElementById('welcome-text').textContent = `Hi, ${nickname}`;
            loadPlaces();
        }
        function checkNickname() {
            const nickname = getNickname();
            if (nickname) { document.getElementById('nickname-overlay').style.display = 'none'; document.getElementById('welcome-text').textContent = `Hi, ${nickname}`; return true; }
            return false;
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelector(`[data-tab="${tab}"]`).classList.add('active');
            document.getElementById('places-section').style.display = tab === 'places' ? 'block' : 'none';
            document.getElementById('events-section').style.display = tab === 'events' ? 'block' : 'none';
        }

        async function loadPlaces() {
            const container = document.getElementById('places-list');
            try {
                let places = await supabaseFetch('places?status=eq.active');
                if (!places || places.length === 0) { container.innerHTML = `<div class="empty"><p>还没有任何想法</p><button class="btn" onclick="openCreatePlaceModal()">+ 添加第一个</button></div>`; return; }
                const placeIds = places.map(p => p.id);

                // 获取评论数据
                const comments = await supabaseFetch(`place_comments?place_id=in.(${placeIds.join(',')})`);

                // 获取想去数据（包含错误处理，容错设计）
                let wishData = {};
                try {
                    const wishes = await supabaseFetch(`place_wishes?place_id=in.(${placeIds.join(',')})&order=created_at.desc`);
                    if (wishes && Array.isArray(wishes)) {
                        const now = Date.now();
                        wishes.forEach(w => {
                            if (!wishData[w.place_id]) {
                                wishData[w.place_id] = { users: [], hasRecent: false, recentUsers: [] };
                            }
                            wishData[w.place_id].users.push(w);
                            // 检查是否近一个月内有想去
                            if (now - new Date(w.created_at).getTime() < ONE_MONTH_MS) {
                                wishData[w.place_id].hasRecent = true;
                                wishData[w.place_id].recentUsers.push(w.created_by);
                            }
                        });
                    }
                } catch (e) {
                    console.warn('获取想去数据失败（功能可能尚未启用）:', e.message);
                }

                const commentCounts = {};
                const latestCommentTime = {};
                const hasImageComment = {};
                (comments || []).forEach(c => {
                    commentCounts[c.place_id] = (commentCounts[c.place_id] || 0) + 1;
                    const t = new Date(c.created_at).getTime();
                    if (!latestCommentTime[c.place_id] || t > latestCommentTime[c.place_id]) {
                        latestCommentTime[c.place_id] = t;
                    }
                    if (c.image_urls && c.image_urls.length > 0) {
                        hasImageComment[c.place_id] = true;
                    }
                });
                // 排序：1. 有近期想去的优先 2. 有图的次之 3. 按最新活动时间排序
                const now = Date.now();
                places.sort((a, b) => {
                    const aWish = wishData[a.id];
                    const bWish = wishData[b.id];
                    const aHasRecentWish = aWish?.hasRecent || false;
                    const bHasRecentWish = bWish?.hasRecent || false;
                    const aHasImage = hasImageComment[a.id] || false;
                    const bHasImage = hasImageComment[b.id] || false;

                    // 第一优先级：有近期想去的置顶
                    if (aHasRecentWish !== bHasRecentWish) {
                        return bHasRecentWish ? 1 : -1;
                    }
                    // 第二优先级：有图的次之
                    if (aHasImage !== bHasImage) {
                        return bHasImage ? 1 : -1;
                    }
                    // 第三优先级：按最新活动时间
                    const aTime = latestCommentTime[a.id] || new Date(a.created_at).getTime();
                    const bTime = latestCommentTime[b.id] || new Date(b.created_at).getTime();
                    return bTime - aTime;
                });

                // 渲染卡片
                const currentNickname = getNickname();
                container.innerHTML = places.map(place => {
                    const wish = wishData[place.id] || { hasRecent: false, recentUsers: [] };
                    const cardClass = wish.hasRecent ? ' card-has-recent-wish' : (hasImageComment[place.id] ? ' card-has-images' : '');
                    const wishBadge = wish.hasRecent ? `<span class="wish-indicator">🔥 ${wish.recentUsers.slice(0, 3).join(', ')}${wish.recentUsers.length > 3 ? '...' : ''}</span>` : '';

      }, "*");
    } catch (error) {
      console.warn("无法发送消息到父窗口:", error);
    }
  }

  // 鼠标离开事件处理
  function handleMouseOut(e) {
    if (!highlightEnabled) return;
    var relatedTarget = e.relatedTarget;

    // 如果鼠标移动到高亮相关元素上，不隐藏高亮
    if (relatedTarget && (relatedTarget === highlightBox || relatedTarget === tagLabel || relatedTarget === overlay || relatedTarget === selectedBox || relatedTarget === selectedLabel)) {
      return;
    }
    highlightBox.style.display = "none";
    tagLabel.style.display = "none";
    try {
      window.parent.postMessage({
        type: "iframe-element-hover",
        data: null,
        source: "iframe-highlight-injector"
      }, "*");
    } catch (error) {
      console.warn("无法发送消息到父窗口:", error);
    }
  }

  // 点击事件处理
  function handleClick(e) {
    var target = e.target;
    if (!target || target === overlay || target === highlightBox || target === tagLabel || target === selectedBox || target === selectedLabel) {
      return;
    }

    // 避免处理 html 和 body 元素
    if (target === document.documentElement || target === document.body) {
      return;
    }

    // 检查是否是交互元素，这些元素需要保留默认行为
    var isInteractiveElement = ['input', 'textarea', 'select', 'button', 'a'].includes(target.tagName.toLowerCase());

    // 如果高亮功能启用，对于非交互元素阻止默认行为和事件传播
    if (highlightEnabled) {
      e.preventDefault();
      e.stopPropagation();
    }
    var rect = target.getBoundingClientRect();
    var selector = getElementSelector(target);
    var text = getElementText(target);
    var attributes = getElementAttributes(target);
    console.log("Element clicked:", {
      tagName: target.tagName,
      selector: selector,
      rect: rect
    });

    // 立即更新选中高亮
    updateSelectedHighlight(target);

    // 隐藏悬停高亮，因为现在是选中状态
    highlightBox.style.display = "none";
    tagLabel.style.display = "none";
    var elementInfo = {
      tagName: target.tagName.toLowerCase(),
      rect: {
        left: rect.left,
        top: rect.top,
        right: rect.right,
        bottom: rect.bottom,
        width: rect.width,
        height: rect.height,
        x: rect.x,
        y: rect.y
      },
      selector: selector,
      text: text,
      attributes: attributes,
      url: window.location.href,
      path: window.location.pathname,
      timestamp: Date.now()
    };
    try {
      window.parent.postMessage({
        type: "iframe-element-click",
        data: elementInfo,
        source: "iframe-highlight-injector"
      }, "*");
    } catch (error) {
      console.warn("无法发送消息到父窗口:", error);
    }
  }

  // 监听来自父窗口的消息
  function handleParentMessage(event) {
    console.log("Received message from parent:", event.data);
    if (event.data.type === "iframe-highlight-toggle") {
      var enabled = event.data.enabled;
      console.log("Highlight toggle:", enabled);
      if (enabled) {
        enableHighlight();
      } else {
        disableHighlight();
      }
    } else if (event.data.type === "enable-iframe-highlight") {
      console.log("Enable iframe highlight");
      enableHighlight();
    } else if (event.data.type === "disable-iframe-highlight") {
      console.log("Disable iframe highlight");
      disableHighlight();
    } else if (event.data.type === "toggle-iframe-highlight") {
      var _enabled = event.data.enabled !== undefined ? event.data.enabled : !highlightEnabled;
      console.log("Toggle iframe highlight to:", _enabled);
      if (_enabled) {
        enableHighlight();
      } else {
        disableHighlight();
      }
    } else if (event.data.type === "update-selected-element") {
      var selector = event.data.selector;
      console.log("Update selected element with selector:", selector);
      if (selector) {
        try {
          var element = document.querySelector(selector);
          console.log("Found element by selector:", element);
          updateSelectedHighlight(element);
        } catch (error) {
          console.warn("Failed to select element:", error);
          updateSelectedHighlight(null);
        }
      } else {
        updateSelectedHighlight(null);
      }
    } else if (event.data.type === "clear-selected-element") {
      console.log("Clear selected element");
      updateSelectedHighlight(null);
    }
  }

  // 启用高亮功能
  function enableHighlight() {
    console.log("Enabling highlight");
    document.addEventListener("mouseover", handleMouseOver, true);
    document.addEventListener("mouseout", handleMouseOut, true);
    document.addEventListener("click", handleClick, true);
    highlightEnabled = true;
    overlay.style.display = "block";
  }

  // 禁用高亮功能
  function disableHighlight() {
    console.log("Disabling highlight");
    highlightEnabled = false;
    // 保持事件监听器，但通过 highlightEnabled 变量控制行为
    // 这样可以保留选中状态的显示
    highlightBox.style.display = "none";
    tagLabel.style.display = "none";
    // 不隐藏 selectedBox 和 selectedLabel，保留选中状态
  }

  // 完全禁用高亮功能（移除所有监听器）
  function fullyDisableHighlight() {
    console.log("Fully disabling highlight");
    highlightEnabled = false;
    document.removeEventListener("mouseover", handleMouseOver, true);
    document.removeEventListener("mouseout", handleMouseOut, true);
    document.removeEventListener("click", handleClick, true);
    overlay.style.display = "none";
    highlightBox.style.display = "none";
    tagLabel.style.display = "none";
    selectedBox.style.display = "none";
    selectedLabel.style.display = "none";
  }

  // 添加事件监听
  enableHighlight();
  window.addEventListener("message", handleParentMessage);

  // 暴露全局函数供外部调用
  window.__iframeHighlightControl = {
    enable: enableHighlight,
    disable: disableHighlight,
    fullyDisable: fullyDisableHighlight,
    isEnabled: function isEnabled() {
      return highlightEnabled;
    },
    getSelectedElement: function getSelectedElement() {
      return selectedElement;
    },
    updateSelected: updateSelectedHighlight,
    // 通过消息发送开关控制
    sendToggleMessage: function sendToggleMessage(enabled) {
      window.parent.postMessage({
        type: 'iframe-highlight-status',
        enabled: enabled || highlightEnabled,
        source: 'iframe-highlight-injector'
      }, '*');
    }
  };

  // 通知父窗口脚本已加载
  try {
    window.parent.postMessage({
      type: "iframe-highlight-ready",
      data: {
        url: window.location.href,
        userAgent: navigator.userAgent,
        timestamp: Date.now()
      },
      source: "iframe-highlight-injector"
    }, "*");
  } catch (error) {
    console.warn("无法发送就绪消息到父窗口:", error);
  }

  // 清理函数
  window.__iframeHighlightCleanup = function () {
    fullyDisableHighlight();
    window.removeEventListener("message", handleParentMessage);
    if (overlay.parentElement) {
      overlay.parentElement.removeChild(overlay);
    }
    delete window.__iframeHighlightInitialized;
    delete window.__iframeHighlightCleanup;
  };
})();

</script>
</body>
